    <script>
        function openCustomModal() {
            const modal = document.getElementById('custom-modal');
            const content = document.getElementById('custom-modal-content');
            modal.classList.remove('hidden');
            setTimeout(() => {
                content.classList.remove('scale-95', 'opacity-0');
                content.classList.add('scale-100', 'opacity-100');
            }, 10);
        }

        function closeCustomModal() {
            const modal = document.getElementById('custom-modal');
            const content = document.getElementById('custom-modal-content');
            content.classList.remove('scale-100', 'opacity-100');
            content.classList.add('scale-95', 'opacity-0');
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 200);
        }

        function submitCustom() {
            const inputVal = document.getElementById('custom-input').value.trim();
            const contextVal = document.getElementById('custom-context').value.trim() || '专属定制';
            
            if(!inputVal) {
                showToast("⚠️ 请输入关键词、标题或网页链接");
                return;
            }

            closeCustomModal();

            // 智能判断输入类型并构建伪热点对象，对接已有引擎
            const isUrl = inputVal.startsWith('http://') || inputVal.startsWith('https://');
            const shortTitle = isUrl ? '深度拆解此链接内容' : inputVal;
            const coreLogic = isUrl 
                ? `(特别指令：请大模型读取提供的URL链接内容，提取核心干货，去粗取精)。原文链接：${inputVal}` 
                : `基于提供的话题，进行思维发散，利用反差或干货盘点逻辑，击中目标人群痛点。`;
            
            const customItem = {
                t: shortTitle,
                s: inputVal,
                l: coreLogic,
                sc: [
                    Math.floor(Math.random() * 15 + 85), 
                    Math.floor(Math.random() * 15 + 85), 
                    Math.floor(Math.random() * 10 + 90), 
                    Math.floor(Math.random() * 10 + 90)
                ],
                cat: contextVal,
                url: isUrl ? inputVal : '#'
            };

            // 清空输入框以便下次使用
            document.getElementById('custom-input').value = '';
            document.getElementById('custom-context').value = '';

            // 直接调用核心渲染引擎，进入实验室
            openLab(customItem);
            showToast("✨ 已为您生成 DIY 专属创作指令！");
        }

        // 使用著名的开源服务 RSSHub，无需 Key 即可获取各大平台热榜数据

            "微博 (社会热搜)": "https://rsshub.app/weibo/search/hot",
            "知乎 (深度热榜)": "https://rsshub.app/zhihu/hotlist",

            "豆瓣 (书影音)": "https://rsshub.app/douban/movie/playing",
            "IT之家 (科技数码)": "https://rsshub.app/ithome/it"
        };
        
        const categories = ["最新混排", ...Object.keys(feedMap)];
        let activeCat = "最新混排";
        let searchQuery = "";
        let trendsCache = {};
        let isLoading = false;

        ];

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.classList.replace('opacity-0', 'opacity-100');
            setTimeout(() => {
                toast.classList.replace('opacity-100', 'opacity-0');
            }, 2500);
        }

        // 核心：调用完全免费、无需 Key 的 rss2json API 抓取真实数据
        async function fetchLiveTrendsAPI(category) {
            isLoading = true;
            renderLoading();
            
            try {
                let targetFeed = feedMap[category];
                // 如果是最新混排，默认抓取 微博 作为首页展示
                if (category === "最新混排") {
                    targetFeed = feedMap["微博 (社会热搜)"];
                }

                // 使用免费开放的 RSS 转 JSON 服务
                const apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(targetFeed)}`;
                
                // 增加超时控制防卡死 (8秒)
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 8000);
                
                const response = await fetch(apiUrl, { signal: controller.signal });
                clearTimeout(timeoutId);

                if (!response.ok) {
                    throw new Error(`HTTP Error: ${response.status}`);
                }

                const data = await response.json();

                if (data.status === 'ok') {
                    // 解析真实新闻数据并转化为小红书热点结构
                    const results = data.items.slice(0, 12).map((item, index) => {
                        // 清除新闻描述中的 HTML 标签，提取纯文本
                        const cleanDesc = item.description 
                            ? item.description.replace(/<[^>]*>?/gm, '').substring(0, 90) + '...' 
                            : '点击进入实验室生成深度解析...';
                        
                        return {
                            t: item.title,
                            s: cleanDesc,
                            l: logicTemplates[index % logicTemplates.length], // 动态分配爆款逻辑
                            sc: [
                                Math.floor(Math.random() * 20 + 80), // 视觉
                                Math.floor(Math.random() * 20 + 80), // 情绪
                                Math.floor(Math.random() * 10 + 90), // 干货
                                Math.floor(Math.random() * 15 + 85)  // 传播
                            ],
                            cat: category === "最新混排" ? "实时热点" : category.split(' ')[0],
                            url: item.link
                        };
                    });
                    isLoading = false;
                    return results;
                } else {
                    throw new Error('API 数据解析异常');
                }
            } catch (error) {
                console.warn("API网络拥堵或超时，已启用本地高分备用热点库:", error);

                showToast("⚠️ 公共网络拥堵，已无缝切换至本地高分爆款库");
                return getFallbackData(category);
            }
        }

        async function init() {
            const pillContainer = document.getElementById('category-pills');
            pillContainer.innerHTML = '';
            categories.forEach(c => {
                const b = document.createElement('button');
                b.className = `category-pill whitespace-nowrap px-6 py-2.5 rounded-2xl text-xs font-bold border border-slate-100 bg-white hover:border-rose-200 transition-all ${c === activeCat ? 'active' : ''}`;
                b.innerText = c;
                b.onclick = async () => { 
                    if(isLoading) return; // 防止重复点击
                    activeCat = c; 
                    Array.from(pillContainer.children).forEach(btn => {
                        btn.className = `category-pill whitespace-nowrap px-6 py-2.5 rounded-2xl text-xs font-bold border border-slate-100 bg-white hover:border-rose-200 transition-all ${btn.innerText === activeCat ? 'active' : ''}`;
                    });
                    await loadAndRenderCategory(); 
                };
                pillContainer.appendChild(b);
            });
            await loadAndRenderCategory();
        }

        async function loadAndRenderCategory() {
            if (!trendsCache[activeCat]) {
                const data = await fetchLiveTrendsAPI(activeCat);
                if (data && data.length > 0) {
                    trendsCache[activeCat] = data; // 存入缓存
                }
            }
            render();
        }

            const grid = document.getElementById('content-grid');

        function handleSearch() {
            searchQuery = document.getElementById('search-input').value.toLowerCase();

        function render() {
            const grid = document.getElementById('content-grid');
            if (isLoading || !trendsCache[activeCat]) return;
            
            grid.innerHTML = '';
            const currentData = trendsCache[activeCat] || [];

            const filtered = currentData.filter(d => {
                const matchSearch = d.t.toLowerCase().includes(searchQuery) || d.s.toLowerCase().includes(searchQuery);
                return matchSearch;
            });

            if(filtered.length === 0) {
                 grid.innerHTML = `<div class="col-span-full text-center text-slate-400 py-10 font-medium">当前分类下暂无包含 "${searchQuery}" 的热点，请尝试其他关键词</div>`;
                 return;
            }

            filtered.forEach(item => {
                const card = document.createElement('div');
                card.className = "bg-white rounded-[32px] p-7 border border-slate-100 shadow-sm hover:shadow-2xl hover:translate-y-[-6px] transition-all cursor-pointer flex flex-col group";
                card.onclick = () => openLab(item);
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-5">
                        <span class="px-3 py-1 bg-rose-50 text-[10px] text-rose-500 font-black rounded-full uppercase tracking-tighter">${item.cat}</span>
                        <div class="text-[10px] font-bold text-amber-500 bg-amber-50 px-2 py-1 rounded-lg">潜力值: ${Math.floor(item.sc[3])}</div>
                    </div>
                    <h3 class="text-base font-black mb-3 line-clamp-2 leading-tight group-hover:text-rose-600 transition-colors">${item.t}</h3>
                    <p class="text-slate-400 text-xs mb-6 line-clamp-2 leading-relaxed">${item.s}</p>
                    <div class="mt-auto pt-5 border-t border-slate-50 flex items-center justify-between">

                            <div class="w-1.5 h-1.5 rounded-full bg-rose-500 animate-bounce"></div>
                            <div class="w-1.5 h-1.5 rounded-full bg-rose-300"></div>

                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function generateFullLLMPrompt(item) {
            return `# 角色设定
你是一位顶尖的前端开发工程师兼小红书资深视觉设计师。极其擅长将纯文本结合画面，排版成极具“网感”的沉浸式页面。

# 任务目标
我将先使用 AI 绘图工具生成了一张绝美的首图，并随附发给你（请查收对话中的图片）。
请基于这幅【首图视觉】以及我提供的【热点选题大纲】，直接编写一个完整的、可独立运行的 HTML 网页正文。
【极其重要！！！⚠️】你生成的网页正文结构（包括各级标题、段落划分、知识点列举）必须与下面提供的“本次创作选题大纲”保持绝对一致！绝不要自行发散或偏离我给定的大纲骨架！网页的色彩呼应和排版情绪可以参考图片，但“文字内容大纲”必须严格遵照以下设定！

# 本次创作选题大纲
【${item.cat}赛道】：${item.t}
（内容内核：${item.s}）
（爆款逻辑骨架：${item.l}）

# HTML 开发规范与视觉美学要求
1. **单文件结构与编码**：所有 HTML 结构与样式（强制使用 Tailwind CSS CDN）必须写在同一个文件中。⚠️极其重要：必须在 <head> 中显式添加 <meta charset="UTF-8"> 标签！请直接使用原生的 Emoji 表情（如 🔥、✨ 等），确保所有中文和表情符号在浏览器中完美渲染，绝不能出现乱码或转义错误！
2. **移动端容器**：在中央绘制一个移动端风格容器（max-w-[400px]，居中，精致的轻拟物阴影）。背景色建议根据主图提取极浅的色调（如 bg-rose-50 / bg-amber-50 等，不要用纯白）。
3. **视觉与大纲的严密融合**：
   - 【大纲100%还原】：必须严格按照上方提供的《内容内核》与《爆款逻辑骨架》进行内容填充。把核心逻辑拆解为清晰的 <h2> / <h3> 小标题或卡片区块，不得遗漏、篡改或自行脑补大纲之外的无关段落。
   - 【纯前端CSS文字首图】：⚠️极其重要：彻底放弃任何占位图 API！绝不允许使用任何 <img> 标签作为首图！请使用一个 <div> 容器（利用 Tailwind 的背景渐变、flex 居中、加粗发光大字体、圆角等样式）在网页最顶端绘制一个高大上的封面排版区块。封面中心渲染的文字必须是：“${item.t}”。
   - 【色彩美学】：排版用到的强调色（如大标题颜色、高亮背景区块、引语左边框），请必须通过 Tailwind 提取与图片画面相一致的主题色，形成高级的色彩同频。
   - 【网感文案】：在绝对不偏离原定大纲的前提下，对文案进行润色，加入抓眼球的黄金3秒标题、高呼吸感的段落间距、贴切的 Emoji，以及底部的 #话题标签集合。
4. **输出限制**：
   - 无需解释逻辑，只需在最外层用 \`\`\`html 包裹输出完整可运行的网页代码。

现在，请观察我发给你的图片，并严格遵循上述文字大纲，立即开动生成这个专属的图文页面代码吧！`;
        }

        function generateFullMJPrompt(item) {
            const specMap = {
                "美妆护肤": "Macro close-up shot, flawless skin texture with subtle moisture, soft natural light, premium cosmetic packaging, pastel color palette, cinematic focus",
                "AI科技": "Futuristic clean office, high-tech devices, holographic interface, minimal aesthetic, neon accents, cinematic depth of field, 8k resolution",
                "副业搞钱": "Cozy workspace at golden hour, a laptop with profit graphs, a cup of specialty coffee, warm atmosphere, professional photography, organized desk"
            };
            const spec = specMap[item.cat] || "High-end commercial photography, cinematic lighting, eye-catching composition, 8k resolution, photorealistic";
            return `Subject: Visual for ${item.t}\n\nPrompt: ${spec}, ${item.s} theme, clean and minimal style, vivid colors, depth of field --v 6.0 --ar 3:4 --stylize 250 --quality 2`;
        }

        function renderChart(scores) {
            const ctx = document.getElementById('detailChart').getContext('2d');
            new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: ['视觉潜力', '情绪共鸣', '实用干货', '互动潜力'],
                    datasets: [{
                        data: scores,
                        backgroundColor: 'rgba(255, 36, 66, 0.2)',
                        borderColor: '#ff2442',
                        borderWidth: 3,
                        pointBackgroundColor: '#ff2442',
                        pointRadius: 4
                    }]
                },
                options: {
                    maintainAspectRatio: false,
                    scales: {
                        r: { 
                            min: 0, max: 100, 
                            ticks: { display: false }, 
                            grid: { color: 'rgba(0,0,0,0.05)' }, 
                            angleLines: { color: 'rgba(0,0,0,0.05)' },
                            pointLabels: { font: { weight: 'bold', size: 12 } } 
                        }
                    },
                    plugins: { legend: { display: false } }
                }
            });
        }

        function switchTab(t) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.getElementById(`${t}-view`).classList.remove('hidden');
            window.scrollTo(0,0);
        }

        function copy(id) {
            const text = document.getElementById(id).innerText;
            
            // 使用 document.execCommand 方案以兼容受限的 iframe 沙盒环境
            const textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.position = "fixed";
            textArea.style.left = "-99999px";
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();

            try {
                document.execCommand('copy');
                showToast("✅ 已为您成功复制指令！现在可以去粘贴给 AI 了");
            } catch (err) {
                console.error('复制失败', err);
                showToast("❌ 复制失败，请手动框选复制");
            }
            
            document.body.removeChild(textArea);
        }

        window.onload = init;
    </script>
